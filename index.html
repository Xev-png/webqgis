<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MAP DESA KOPANDAKAN 1</title>

<link rel="stylesheet" href="./resources/ol.css">
<link rel="stylesheet" href="./resources/ol-layerswitcher.css">
<link rel="stylesheet" href="./resources/qgis2web.css">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

/* BACKGROUND FIX */
body {
    min-height: 100vh;
    background:
        radial-gradient(circle at top left, rgba(147,51,234,0.2), transparent 20%),
        radial-gradient(circle at bottom right, rgba(56,189,248,0.18), transparent 20%),
        linear-gradient(180deg, #0b1220 0%, #050916 60%, #070b1d 100%);
    color: #edf2ff;
    font-family: sans-serif;
    background-attachment: fixed;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    display: flex;
    gap: 10px;
    padding: 12px;
    background: rgba(10,15,30,0.9);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.navbar button {
    background: rgba(168,85,247,0.2);
    border: none;
    color: #fff;
    padding: 10px 16px;
    border-radius: 12px;
    cursor: pointer;
}

.navbar button:hover {
    background: rgba(168,85,247,0.5);
}

/* PAGE SYSTEM */
.page {
    display: none;
    padding: 20px;
    animation: fade 0.4s ease;
}

.page.active {
    display: block;
}

@keyframes fade {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

/* CARD */
.card {
    background: rgba(12, 23, 52, 0.9);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* MAP */
#map {
    width: 100%;
    height: 70vh;
    border-radius: 20px;
    overflow: hidden;
    margin-top: 10px;
}

/* TEXT */
h1, h2 {
    margin-top: 0;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('mapPage')">Peta</button>
    <button onclick="showPage('about')">About</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
    <div class="card">
        <h1>MAP DESA KOPANDAKAN 1</h1>
        <p>
        Desa Kopandakan 1 adalah wilayah pedesaan dengan area pemukiman,
        persawahan, dan jaringan jalan yang tertata.
        </p>
    </div>
</div>

<!-- MAP -->
<div id="mapPage" class="page">
    <div class="card">
        <h2>Peta Desa</h2>
        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
    </div>
</div>

<!-- ABOUT -->
<div id="about" class="page">
    <div class="card">
        <h2>About</h2>
        <p>Data pembuat:</p>
        <ul>
            <li>Nama: Sheva Sumarna</li>
            <li>NIM: 241011060058</li>
            <li>Kelas: Sistem Informasi-B</li>
        </ul>
    </div>
</div>

<!-- SCRIPT NAVIGASI -->
<script>
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

<!-- QGIS2WEB SCRIPTS -->
<script src="resources/qgis2web_expressions.js"></script>
<script src="resources/proj4.js"></script>
<script>
proj4.defs('EPSG:3857','+proj=merc +a=6378137 +b=6378137 +lat_ts=0 +lon_0=0 +x_0=0 +y_0=0 +k=1 +units=m +nadgrids=@null +wktext +no_defs');
</script>

<script src="./resources/functions.js"></script>
<script src="./resources/ol.js"></script>
<script src="./resources/ol-layerswitcher.js"></script>
<script src="layers/DESAKOPANDAKAN1_1.js"></script>
<script src="styles/DESAKOPANDAKAN1_1_style.js"></script>
<script src="./layers/layers.js"></script>
<script src="./resources/Autolinker.min.js"></script>
<script src="./resources/qgis2web.js"></script>

</body>
</html>
